[tool.black]
line-length = 88
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
ignore_missing_imports = true
no_strict_optional = true
warn_return_any = false
check_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
